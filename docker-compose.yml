name: opencode

# OpenCode 容器部署
# 反代/HTTPS 由外部 nginx 自行配置，指向 127.0.0.1:4096
services:
  opencode:
    # 本地构建镜像（不用 ghcr.io 预构建镜像）
    # 如要切换回官方预构建镜像，注释下面 build + 替换为：image: ghcr.io/pilinux/opencode:1.2.5
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCODE_VERSION: ${OPENCODE_VERSION:-latest}
    image: opencode:local
    container_name: opencode
    # 仅在容器内监听 0.0.0.0，端口绑定到所有网卡
    # ⚠️ 安全提示：4096 端口将对外暴露，请确保：
    #   1. 服务器防火墙/安全组限制来源 IP
    #   2. 或通过外部 nginx 反代 + HTTPS 使用
    command: opencode serve --hostname 0.0.0.0 --port 4096
    ports:
      - "0.0.0.0:4096:4096"
    volumes:
      - ./data/share:/home/opencode/.local/share/opencode
      - ./data/state:/home/opencode/.local/state/opencode
      - ./data/config:/home/opencode/.config/opencode
      # 工作目录：放你用 opencode 开发的项目代码
      - ./data/work:/data/work
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4096"]
      interval: 30s
      timeout: 5s
      retries: 3
    # 资源限制：内存 1GB / CPU 1 核
    # 内存给 Node.js 足够空间处理大对话历史，避免 OOM kill
    # CPU 1 核够用（LLM 推理在云端，本地只做 IO）
    # 如服务器内存紧张，可改为 memory: 512m 并加环境变量：
    #   NODE_OPTIONS=--max-old-space-size=384
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
          cpus: "0.25"
